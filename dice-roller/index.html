<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=240,height=282,user-scalable=no">
<title>Dice Roller</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 240px; height: 282px; overflow: hidden;
  background: #0e0e10;
  font-family: -apple-system, sans-serif;
  -webkit-user-select: none; user-select: none;
}

/* ── Header tabs ── */
#hdr {
  height: 30px;
  display: flex; align-items: stretch;
  border-bottom: 1px solid #1e1e20;
}
.tab {
  flex: 1; display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; letter-spacing: 2px;
  color: #3a3a3e; cursor: pointer; text-transform: uppercase;
  border-right: 1px solid #1e1e20;
  transition: color 0.15s;
}
.tab:last-child { border-right: none; }
.tab.on { color: #D97706; box-shadow: inset 0 -2px 0 #D97706; }

/* ── HP tracker ── */
#hp-area {
  display: none; flex-direction: column;
  align-items: center; justify-content: center;
  width: 240px; height: 210px;
}
#hp-val {
  font-size: 88px; font-weight: 700; color: #fff;
  line-height: 1; letter-spacing: -2px;
  transition: color 0.2s;
}
#hp-lbl { font-size: 10px; color: #444; letter-spacing: 3px; margin-top: 8px; }

/* ── Turn order picker ── */
#turns-area {
  display: none; flex-direction: column;
  align-items: center; justify-content: center;
  width: 240px; height: 210px; gap: 6px;
}
#turns-count { font-size: 13px; font-weight: 700; color: #D97706; letter-spacing: 1px; }
#turns-list {
  font-size: 12px; color: #fff; text-align: center;
  line-height: 20px; white-space: pre-line;
}
#turns-sub { font-size: 9px; color: #3a3a3e; letter-spacing: 1px; text-transform: uppercase; margin-top: 4px; }

/* ── Die selector strip ── */
#sel {
  height: 36px;
  display: flex; align-items: center; justify-content: center;
  gap: 4px; padding: 0 7px;
  background: #111113;
  border-bottom: 1px solid #1e1e20;
}
.dpill {
  flex: 1; height: 24px; border-radius: 5px;
  background: #1c1c1e; color: #555;
  font-size: 10px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  border: 1px solid #2a2a2e;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
  cursor: pointer;
}
.dpill.on {
  background: #1c1000;
  color: #F59E0B;
  border-color: #D97706;
}

/* ── Main die area ── */
#main {
  height: 174px;
  display: flex; align-items: center; justify-content: center;
}

@keyframes shake {
  0%   { transform: translateX(0); }
  18%  { transform: translateX(-7px); }
  36%  { transform: translateX(7px); }
  54%  { transform: translateX(-4px); }
  72%  { transform: translateX(4px); }
  90%  { transform: translateX(-1px); }
  100% { transform: translateX(0); }
}
#main.rolling { animation: shake 0.32s ease-out; }

#die-svg { width: 240px; height: 174px; }

/* ── Footer ── */
#ftr {
  height: 42px;
  border-top: 1px solid #1e1e20;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 3px;
}
#mode-lbl {
  height: 13px;
  font-size: 10px; font-weight: 700;
  color: #D97706; letter-spacing: 1px; text-transform: uppercase;
}
#hint-lbl {
  font-size: 9px; color: #333;
  letter-spacing: 1px; text-transform: uppercase;
}
</style>
</head>
<body>

<div id="hdr">
  <div class="tab on" data-mode="dice">Dice</div>
  <div class="tab"    data-mode="hp">HP</div>
  <div class="tab"    data-mode="turns">Turns</div>
</div>

<div id="sel"></div>

<div id="main">
  <svg id="die-svg" viewBox="0 0 240 174">
    <!-- Ghost die: offset behind main, only visible in 2-dice mode -->
    <polygon id="die-ghost"
      points=""
      fill="#0c0c00"
      stroke="#92400E"
      stroke-width="1.5"
      stroke-linejoin="round"
      opacity="0"
      transform="translate(9,7)" />
    <!-- Main die -->
    <polygon id="die-poly"
      points=""
      fill="#111108"
      stroke="#D97706"
      stroke-width="2"
      stroke-linejoin="round" />
    <!-- Result number (SVG attrs used — not CSS — for R1 WebView compat) -->
    <text id="die-num"
      x="120" y="80"
      font-family="-apple-system, sans-serif"
      font-weight="700"
      font-size="60"
      fill="#2a2a2e"
      text-anchor="middle"
      dominant-baseline="central">?</text>
    <!-- Two-dice breakdown (e.g. "3  +  4") -->
    <text id="die-sub"
      x="120" y="155"
      font-family="-apple-system, sans-serif"
      font-weight="500"
      font-size="11"
      fill="#777"
      text-anchor="middle"
      dominant-baseline="central"
      letter-spacing="1"></text>
  </svg>
  <div id="hp-area">
    <div id="hp-val">20</div>
    <div id="hp-lbl">HP</div>
  </div>
  <div id="turns-area">
    <div id="turns-count">PLAYERS: 4</div>
    <div id="turns-list"></div>
    <div id="turns-sub">scroll · tap to shuffle</div>
  </div>
</div>

<div id="ftr">
  <div id="mode-lbl"></div>
  <div id="hint-lbl">shake &middot; scroll &middot; side btn</div>
</div>

<script>
var DICE = [
  { sides: 2,  label: 'c2',  n: 40, rot: 0             }, // coin — circle
  { sides: 4,  label: 'd4',  n: 3, rot: -Math.PI / 2  }, // triangle, point up
  { sides: 6,  label: 'd6',  n: 4, rot: -Math.PI / 4  }, // square, flat top
  { sides: 8,  label: 'd8',  n: 4, rot:  0             }, // diamond
  { sides: 10, label: 'd10', n: 5, rot: -Math.PI / 2  }, // pentagon, point up
  { sides: 12, label: 'd12', n: 6, rot:  0             }, // hexagon, flat sides
  { sides: 20, label: 'd20', n: 8, rot: -Math.PI / 8  }, // octagon
];

var dieIdx  = 2;   // default d6
var multi   = 1;   // 1 or 2 dice
var results = [];
var rolling = false;
var flashTimer = null;

// Shake detection
var canShake = true;
var px = 0, py = 0, pz = 0, firstRead = true;

function polyPts(n, cx, cy, r, rot) {
  var pts = [];
  for (var i = 0; i < n; i++) {
    var a = rot + 2 * Math.PI * i / n;
    pts.push(
      (cx + r * Math.cos(a)).toFixed(1) + ',' +
      (cy + r * Math.sin(a)).toFixed(1)
    );
  }
  return pts.join(' ');
}

function rng(sides) {
  return Math.floor(Math.random() * sides) + 1;
}

function buildSel() {
  var sel = document.getElementById('sel');
  sel.innerHTML = '';
  DICE.forEach(function(d, i) {
    var el = document.createElement('div');
    el.className = 'dpill' + (i === dieIdx ? ' on' : '');
    el.textContent = d.label;
    (function(idx) {
      el.addEventListener('pointerdown', function() {
        dieIdx = idx;
        results = [];
        render();
      });
    })(i);
    sel.appendChild(el);
  });
}

function render() {
  buildSel();

  var d      = DICE[dieIdx];
  var pts    = polyPts(d.n, 120, 80, 62, d.rot);
  var poly   = document.getElementById('die-poly');
  var ghost  = document.getElementById('die-ghost');
  var numEl  = document.getElementById('die-num');
  var subEl  = document.getElementById('die-sub');
  var modeEl = document.getElementById('mode-lbl');

  // Polygon shapes (ghost uses same pts, offset via transform attr)
  poly.setAttribute('points', pts);
  ghost.setAttribute('points', pts);

  // 2-dice mode: show ghost die + mode label
  if (multi === 2) {
    ghost.setAttribute('opacity', '0.55');
    modeEl.textContent = '2 \u00D7 ' + d.label;
  } else {
    ghost.setAttribute('opacity', '0');
    modeEl.textContent = '';
  }

  // Result display — use setAttribute, NOT .style, for SVG text on R1 WebView
  var isCoin = d.sides === 2;
  if (results.length === 0) {
    numEl.setAttribute('font-size', '60');
    numEl.setAttribute('fill', '#2a2a2e');
    numEl.textContent = '?';
    subEl.textContent = '';
  } else if (isCoin) {
    if (multi === 1) {
      numEl.setAttribute('font-size', '72');
      numEl.setAttribute('fill', '#ffffff');
      numEl.textContent = results[0] === 1 ? 'H' : 'T';
      subEl.setAttribute('fill', '#888888');
      subEl.textContent = results[0] === 1 ? 'HEADS' : 'TAILS';
    } else {
      var l1 = results[0] === 1 ? 'H' : 'T', l2 = results[1] === 1 ? 'H' : 'T';
      numEl.setAttribute('font-size', '60');
      numEl.setAttribute('fill', '#ffffff');
      numEl.textContent = l1 + ' ' + l2;
      subEl.setAttribute('fill', '#888888');
      subEl.textContent = (results[0]===1?'HEADS':'TAILS') + '  ·  ' + (results[1]===1?'HEADS':'TAILS');
    }
  } else if (multi === 1) {
    var v = results[0];
    numEl.setAttribute('font-size', v >= 10 ? '54' : '64');
    numEl.setAttribute('fill', '#ffffff');
    numEl.textContent = v;
    subEl.textContent = '';
  } else {
    var total = results[0] + results[1];
    numEl.setAttribute('font-size', total >= 10 ? '54' : '64');
    numEl.setAttribute('fill', '#ffffff');
    numEl.textContent = total;
    subEl.setAttribute('fill', '#888888');
    subEl.textContent = results[0] + '  +  ' + results[1];
  }
}

function doRoll() {
  if (rolling) return;
  rolling = true;
  results = [];

  var d     = DICE[dieIdx];
  var count = multi;
  var numEl = document.getElementById('die-num');
  var subEl = document.getElementById('die-sub');
  var poly  = document.getElementById('die-poly');
  var main  = document.getElementById('main');

  // Shake animation on container
  main.classList.remove('rolling');
  void main.offsetWidth;
  main.classList.add('rolling');

  // Brighten stroke while rolling
  poly.setAttribute('stroke', '#F59E0B');

  var step = 0, STEPS = 10;
  if (flashTimer) clearTimeout(flashTimer);

  var isCoin = d.sides === 2;
  function flash() {
    if (step < STEPS) {
      numEl.setAttribute('fill', '#F59E0B');
      if (isCoin) {
        numEl.setAttribute('font-size', count === 1 ? '72' : '60');
        if (count === 1) {
          numEl.textContent = step % 2 === 0 ? 'H' : 'T';
        } else {
          numEl.textContent = (step%2===0?'H':'T') + ' ' + (step%2===0?'T':'H');
        }
        subEl.textContent = '';
      } else if (count === 1) {
        var v = rng(d.sides);
        numEl.setAttribute('font-size', v >= 10 ? '54' : '64');
        numEl.textContent = v;
        subEl.textContent = '';
      } else {
        var r1 = rng(d.sides), r2 = rng(d.sides), tot = r1 + r2;
        numEl.setAttribute('font-size', tot >= 10 ? '54' : '64');
        numEl.textContent = tot;
        subEl.setAttribute('fill', '#F59E0B');
        subEl.textContent = r1 + '  +  ' + r2;
      }
      step++;
      flashTimer = setTimeout(flash, 20 + step * 18);
    } else {
      var res = [];
      for (var i = 0; i < count; i++) res.push(rng(d.sides));
      results = res;
      poly.setAttribute('stroke', '#D97706');
      subEl.setAttribute('fill', '#888888');
      render();
      rolling = false;
    }
  }

  flash();
}

// ── App modes ────────────────────────────────────────────────────────────────
var appMode = 'dice';
var hpVal = 20;
var playerCount = 4;
var turnOrder = [];

function switchMode(m) {
  appMode = m;
  var sel  = document.getElementById('sel');
  var main = document.getElementById('main');
  var svg  = document.getElementById('die-svg');
  var hpA  = document.getElementById('hp-area');
  var trnA = document.getElementById('turns-area');
  document.querySelectorAll('.tab').forEach(function(t) {
    t.classList.toggle('on', t.getAttribute('data-mode') === m);
  });
  sel.style.display  = m === 'dice' ? 'flex' : 'none';
  main.style.height  = m === 'dice' ? '174px' : '210px';
  svg.style.display  = m === 'dice' ? '' : 'none';
  hpA.style.display  = m === 'hp'   ? 'flex' : 'none';
  trnA.style.display = m === 'turns'? 'flex' : 'none';
  document.getElementById('mode-lbl').textContent = '';
  if (m === 'dice') {
    document.getElementById('hint-lbl').textContent = 'shake \u00b7 scroll \u00b7 side btn';
  } else if (m === 'hp') {
    renderHP();
    document.getElementById('hint-lbl').textContent = 'scroll \u00b11  \u00b7  long press reset';
  } else {
    renderTurns();
    document.getElementById('hint-lbl').textContent = 'scroll players  \u00b7  tap shuffle';
  }
}

function renderHP() {
  var el = document.getElementById('hp-val');
  el.textContent = hpVal;
  el.style.color = hpVal <= 0 ? '#ef4444' : hpVal <= 5 ? '#f97316' : '#fff';
}

function renderTurns() {
  var countEl = document.getElementById('turns-count');
  var listEl  = document.getElementById('turns-list');
  var subEl   = document.getElementById('turns-sub');
  if (turnOrder.length === 0) {
    countEl.textContent = 'PLAYERS: ' + playerCount;
    listEl.textContent  = '';
    subEl.textContent   = 'scroll \u00b7 tap to shuffle';
  } else {
    countEl.textContent = playerCount + ' PLAYERS';
    var ord = ['1st','2nd','3rd','4th','5th','6th','7th','8th'];
    listEl.textContent = turnOrder.map(function(p, i) {
      return ord[i] + '  \u2192  Player ' + p;
    }).join('\n');
    subEl.textContent = 'tap to re-shuffle';
  }
}

function shuffleTurns() {
  var arr = [];
  for (var i = 1; i <= playerCount; i++) arr.push(i);
  for (var i = arr.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
  }
  turnOrder = arr;
  renderTurns();
}

// ── R1 hardware events ───────────────────────────────────────────────────────
window.addEventListener('scrollUp', function() {
  if (appMode === 'hp') { hpVal = Math.max(-99, hpVal - 1); renderHP(); return; }
  if (appMode === 'turns') { playerCount = Math.max(2, playerCount - 1); turnOrder = []; renderTurns(); return; }
  dieIdx = (dieIdx - 1 + DICE.length) % DICE.length;
  results = [];
  render();
});

window.addEventListener('scrollDown', function() {
  if (appMode === 'hp') { hpVal = Math.min(999, hpVal + 1); renderHP(); return; }
  if (appMode === 'turns') { playerCount = Math.min(8, playerCount + 1); turnOrder = []; renderTurns(); return; }
  dieIdx = (dieIdx + 1) % DICE.length;
  results = [];
  render();
});

window.addEventListener('sideClick', function() {
  if (appMode === 'hp') { hpVal = 20; renderHP(); return; }
  if (appMode === 'turns') { shuffleTurns(); return; }
  multi = multi === 1 ? 2 : 1;
  results = [];
  render();
});

window.addEventListener('longPressStart', function() {
  if (appMode === 'hp') { hpVal = 20; renderHP(); return; }
  if (appMode === 'turns') { shuffleTurns(); return; }
  doRoll();
});

// Tap to roll (dice) or shuffle (turns)
document.getElementById('main').addEventListener('pointerdown', function() {
  if (appMode === 'turns') { shuffleTurns(); return; }
  if (appMode === 'dice') doRoll();
});

// ── Accelerometer shake detection ────────────────────────────────────────────
// 60Hz for faster peak capture. Magnitude at rest ≈ 1.0 (gravity only).
// Threshold 1.2 (was 1.3) — catches a moderate shake without false positives.
// Jerk threshold 0.25 (was 0.3) — catches quick direction reversals.
async function initAccel() {
  if (typeof window.creationSensors === 'undefined') {
    initMotion();
    return;
  }
  try {
    var available = await window.creationSensors.accelerometer.isAvailable();
    if (!available) {
      document.getElementById('hint-lbl').textContent = 'no sensor · scroll · side btn';
      return;
    }
    firstRead = true;
    var dbg = document.getElementById('dbg');
    window.creationSensors.accelerometer.start(function(data) {
      var mag = Math.sqrt(data.x*data.x + data.y*data.y + data.z*data.z);
      var jmag = 0;
      if (!firstRead) {
        var jx = data.x - px, jy = data.y - py, jz = data.z - pz;
        jmag = Math.sqrt(jx*jx + jy*jy + jz*jz);
      }
      px = data.x; py = data.y; pz = data.z;
      firstRead = false;
      // Show live values so we can calibrate the threshold
      dbg.textContent = 'mag:' + mag.toFixed(2) + ' j:' + jmag.toFixed(3);
      if (jmag > 0.08 && canShake) {
        canShake = false;
        if (appMode === 'turns') shuffleTurns(); else if (appMode === 'dice') doRoll();
        setTimeout(function() { canShake = true; }, 1000);
      }
    }, { frequency: 60 });
  } catch(e) {
    document.getElementById('hint-lbl').textContent = 'sensor error · scroll · side btn';
  }
}

document.addEventListener('visibilitychange', function() {
  if (typeof window.creationSensors === 'undefined') return;
  if (document.hidden) {
    try { window.creationSensors.accelerometer.stop(); } catch(e) {}
  } else {
    initAccel();
  }
});

// ── DeviceMotionEvent fallback (if creationSensors not available) ─────────────
// accelerationIncludingGravity is in m/s². At rest ≈ 9.8 on z-axis.
// A hard shake spikes the jerk (delta between samples) well above 5 m/s².
function initMotion() {
  var mpx = null, mpy = null, mpz = null;
  window.addEventListener('devicemotion', function(e) {
    var a = e.accelerationIncludingGravity;
    if (!a) return;
    var x = a.x || 0, y = a.y || 0, z = a.z || 0;
    if (mpx !== null) {
      var jx = x - mpx, jy = y - mpy, jz = z - mpz;
      var jmag = Math.sqrt(jx*jx + jy*jy + jz*jz);
      if (jmag > 8 && canShake) {
        canShake = false;
        if (appMode === 'turns') shuffleTurns(); else if (appMode === 'dice') doRoll();
        setTimeout(function() { canShake = true; }, 1000);
      }
    }
    mpx = x; mpy = y; mpz = z;
  });
}

// ── Keyboard fallbacks for desktop testing ───────────────────────────────────
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')    window.dispatchEvent(new Event('scrollUp'));
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown')  window.dispatchEvent(new Event('scrollDown'));
  if (e.key === ' ')   { e.preventDefault(); doRoll(); }
  if (e.key === 'Enter') doRoll();
  if (e.key === 's')   window.dispatchEvent(new Event('sideClick'));
});

// Tab click handlers
document.querySelectorAll('.tab').forEach(function(t) {
  t.addEventListener('pointerdown', function(e) {
    e.stopPropagation();
    switchMode(t.getAttribute('data-mode'));
  });
});

render();
initAccel();
</script>
</body>
</html>
