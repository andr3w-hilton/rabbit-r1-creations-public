<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Install R1 Chat</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #080810; color: #fff;
  font-family: -apple-system, sans-serif;
  min-height: 100vh;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 32px;
}
svg.gem { width: 56px; height: 56px; margin-bottom: 16px; }
h1 { font-size: 24px; font-weight: 700; margin-bottom: 6px; color: #9d93ff; letter-spacing: 1px; }
p { font-size: 13px; color: rgba(255,255,255,0.4); margin-bottom: 28px; text-align: center; }
#qr { margin-bottom: 20px; border-radius: 12px; overflow: hidden; }
.url {
  font-size: 10px; color: rgba(124,110,255,0.4);
  word-break: break-all; text-align: center; max-width: 280px;
}
</style>
</head>
<body>

<svg class="gem" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
  <polygon points="26,4 46,16 46,36 26,48 6,36 6,16" fill="rgba(124,110,255,0.15)" stroke="#7C6EFF" stroke-width="1.5"/>
  <polygon points="26,4 36,16 26,28 16,16" fill="rgba(124,110,255,0.3)"/>
  <polygon points="6,16 16,16 26,28 6,36" fill="rgba(124,110,255,0.12)"/>
  <polygon points="46,16 36,16 26,28 46,36" fill="rgba(124,110,255,0.2)"/>
  <polygon points="6,36 26,28 46,36 26,48" fill="rgba(124,110,255,0.15)"/>
  <circle cx="26" cy="26" r="4" fill="#7C6EFF" opacity="0.8"/>
</svg>

<h1>R1 Chat</h1>
<p>Scan with your Rabbit R1 to install.</p>
<div id="qr"></div>
<div class="url" id="url-label"></div>

<script src="https://unpkg.com/qr-code-styling@1.6.0/lib/qr-code-styling.js"></script>
<script>
  var creationUrl = 'https://your-domain.com/gemma-chat/?v=3';
  document.getElementById('url-label').textContent = creationUrl;

  var qrData = JSON.stringify({
    title: "R1 Chat",
    url: creationUrl,
    description: "AI chat powered by Gemma 4",
    iconUrl: "",
    themeColor: "#4ADE80"
  });

  var qrCode = new QRCodeStyling({
    width: 260, height: 260,
    data: qrData,
    dotsOptions: { color: '#ffffff', type: 'rounded' },
    backgroundOptions: { color: '#080810' },
    cornersSquareOptions: { color: '#7C6EFF', type: 'extra-rounded' },
    cornersDotOptions: { color: '#9d93ff' }
  });
  qrCode.append(document.getElementById('qr'));
</script>
</body>
</html>
